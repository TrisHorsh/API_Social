<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Social</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Bài tập API Social</a>
            <div class="d-flex" id="auth-buttons">
                <!-- Nút đăng nhập sẽ hiện ở đây -->
                <button class="btn btn-outline-primary me-2" onclick="login('google')" id="btnLoginGoogle">Login Google</button>
                <button class="btn btn-outline-light" onclick="login('github')" id="btnLoginGithub">Login GitHub</button>
                <button class="btn btn-danger" onclick="logout()" id="btnLogout" style="display: none;">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Thông tin nhóm -->
        <div class="alert alert-info">
            <h4>Thông tin nhóm</h4>
            <p class="mb-0">Họ tên: <strong>Trần Thiên Triệu</strong> | MSSV: <strong>DH52201647</strong></p>
            <p class="mb-0">Họ tên: <strong>Trần Văn Thật</strong> | MSSV: <strong>DH52201476</strong></p>
            <p class="mb-0">Họ tên: <strong>Nguyễn Gia Phát</strong> | MSSV: <strong>DH52201186</strong></p>
            <p class="mb-0">Họ tên: <strong>Dương Hồng Diểm</strong> | MSSV: <strong>DH52200502</strong></p>
        </div>

        <h2 class="my-4 text-center">Danh sách sản phẩm</h2>
        <div class="row" id="product-list">
            <!-- Sản phẩm render từ MockAPI -->
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="app.js"></script>
</body>
</html>
